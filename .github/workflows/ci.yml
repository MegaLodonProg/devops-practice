name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check Python syntax
        run: python -m py_compile app/main.py

  build-and-test-docker:
    runs-on: ubuntu-latest
    needs: test-python
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t counter:test .
      
      - name: Run container
        run: docker run -d -p 8080:5000 --name counter_test counter:test
      
      - name: Wait and show logs
        run: |
          sleep 5
          echo "=== Container logs ==="
          docker logs counter_test
      
      - name: Just check if app responds
        run: |
          # Самый простой тест — просто проверяем, что сервер отвечает
          curl --fail http://localhost:8080 || exit 1
          echo "App is running and responds"
      
      - name: Cleanup
        if: always()
        run: |
          docker stop counter_test || true
          docker rm counter_test || true